/* Suggestion bubble picker: tap to select, fills text field */
function SuggPicker({suggestions,value,onChange,placeholder,label}){
  return <div>
    {label&&<div style={{fontSize:12,color:"#6B6B6B",marginBottom:6}}>{label}</div>}
    <div style={{marginBottom:6}}>
      {suggestions.map((s,i)=><span key={i} onClick={()=>onChange(s)}
        style={{...S.suggBubble,...(value===s?S.suggBubbleSel:{})}}>{s}</span>)}
    </div>
    <div style={{fontSize:12,fontStyle:"italic",color:"#999",marginBottom:4}}>✍️ Tap one above or write your own — just make sure it fits your book and what your students know.</div>
    <textarea value={value} onChange={e=>onChange(e.target.value)} rows={2} placeholder={placeholder}
      style={{...S.fld,...(value?S.fldOk:{})}}/>
  </div>;
}

  const ttExtras=strat?(TT_MATRIX_EXTRA[sid]||TT_MATRIX_EXTRA.default):TT_MATRIX_EXTRA.default;

  const togBf=o=>sBfC(p=>p.includes(o)?p.filter(x=>x!==o):p.length>=2?p:[...p,o]);
  const togDr=o=>sDrC(p=>p.includes(o)?p.filter(x=>x!==o):p.length>=2?p:[...p,o]);
  const togAf=o=>{
    if(o==="none"){sAfA(["none"]);return;}
    sAfA(p=>{
      const clean=p.filter(x=>x!=="none");
      if(clean.includes(o))return clean.filter(x=>x!==o);
      if(clean.length>=2)return clean;
      return[...clean,o];
    });
  };

  const mkDefs=()=>{const w=vW.split(",").map(x=>x.trim()).filter(Boolean);if(w.length){sVD(genDefs(w));sShowD(true);}};
  const updDef=(i,v)=>sVD(p=>p.map((d,j)=>j===i?{...d,meaning:v,edited:true}:d));
  const setAfNote=(act,v)=>sAfNotes(p=>({...p,[act]:v}));

  const hasVocabBefore=bfC.includes("Explain new vocabulary");
  const hasWordsDuring=drC.includes("Explain important words or ideas");

  // T&T question management — editable slots
  const updateTTQ=(i,v)=>sTTQs(p=>p.map((q,j)=>j===i?v:q));
  const addTTQ=()=>{if(ttQs.length<3)sTTQs(p=>[...p,""]);};
  const removeTTQ=(i)=>sTTQs(p=>p.filter((_,j)=>j!==i));
  const pickTTQ=(text)=>{
    const emptyIdx=ttQs.findIndex(q=>!q.trim());
    if(emptyIdx>=0){updateTTQ(emptyIdx,text);}
    else if(ttQs.length<3){sTTQs(p=>[...p,text]);}
  };

  const getAllTTQs=()=>ttQs.filter(q=>q.trim()).map(q=>({q}));

  const autoRCE=()=>{
    const all=ttQs.join(" ").toLowerCase();const t=[];
    if(all.includes("what happened")||all.includes("who")||all.includes("characters"))t.push("Recall");
    if(all.includes("why")||all.includes("think")||all.includes("clue")||all.includes("feel")||all.includes("same or different"))t.push("Connect");
    if(all.includes("author")||all.includes("learn")||all.includes("should")||all.includes("agree"))t.push("Evaluate");
    if(!t.length)t.push("Connect");return t;
  };

  return(
    <div style={{minHeight:"100vh",display:"flex",justifyContent:"center",padding:12,background:"#F0EBE3"}}>
      <div style={S.frame}>
        <div style={S.header}>
          <div style={S.hIcon}>📖</div>
          <div><div style={{fontWeight:700,fontSize:16,letterSpacing:-.3}}>Lesson Plan Builder</div><div style={{fontSize:12,opacity:.75}}>Interactive mockup</div></div>
        </div>
        <div style={S.body}>

          {/* ===== STEP 1 ===== */}
          <Div l="Step 1 · Basics"/>
          <Bub ch={<div>
            <b>{"Let\u2019s plan your read-aloud lesson!"}</b>

            <div style={{fontSize:12.5,fontWeight:600,marginTop:10,marginBottom:5}}>How are you planning today?</div>
            <div style={{display:"flex",gap:6,marginBottom:10}}>
              <div onClick={()=>sMode("build")} style={{flex:1,padding:"8px 10px",borderRadius:10,border:"2px solid "+(mode==="build"?"#166534":"#E5E0DA"),background:mode==="build"?"#E8F3ED":"#fff",cursor:"pointer",textAlign:"center"}}>
                <div style={{fontSize:12.5,fontWeight:600,color:mode==="build"?"#166534":"#2C2C2C"}}>{"\uD83D\uDCF1"} Build</div>
                <div style={{fontSize:10,color:"#888",marginTop:2}}>Full plan, saved</div>
              </div>
              <div onClick={()=>sMode("guide")} style={{flex:1,padding:"8px 10px",borderRadius:10,border:"2px solid "+(mode==="guide"?"#166534":"#E5E0DA"),background:mode==="guide"?"#E8F3ED":"#fff",cursor:"pointer",textAlign:"center"}}>
                <div style={{fontSize:12.5,fontWeight:600,color:mode==="guide"?"#166534":"#2C2C2C"}}>{"\uD83D\uDCBB"} Guide</div>
                <div style={{fontSize:10,color:"#888",marginTop:2}}>Walkthrough, you plan on your own</div>
              </div>
            </div>

            <div style={{display:"flex",gap:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:11,fontWeight:600,color:"#6B6B6B",marginBottom:2}}>Grade</div>
                <select value={grade} onChange={e=>{sGrade(e.target.value);if(e.target.value&&stu&&mode)go(1)}} style={{...S.fld,padding:"8px 10px",...(grade?S.fldOk:{})}}>
                  <option value="">Select</option>{[1,2,3,4,5].map(g=><option key={g} value={g}>Grade {g}</option>)}
                </select>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:11,fontWeight:600,color:"#6B6B6B",marginBottom:2}}>Students</div>
                <input type="number" value={stu} onChange={e=>{sStu(e.target.value);if(grade&&e.target.value&&mode)go(1)}} placeholder="e.g. 34" style={{...S.fld,...(stu?S.fldOk:{})}}/>
              </div>
            </div>
            {mode&&grade&&stu&&<div style={{fontSize:10,color:"#999",fontStyle:"italic",marginTop:6}}>{mode==="guide"?"Inputs are optional in Guide mode. Use this as a reference while you plan elsewhere.":""}</div>}
          </div>}/>

          {/* ===== STEP 2 ===== */}
          {step>=1&&<><Bub ch={<span>Grade {grade}, {stu} students</span>} u/>
          <Div l="Step 2 · Objective"/>
          <Bub ch={<div>
            <b>What's the main objective?</b>
            <div style={{maxHeight:240,overflowY:"auto",marginTop:6}}>
              {ALL_STRATEGIES.map(s=><div key={s.id} onClick={()=>{sStrat(s);go(2)}} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderRadius:8,fontSize:13,cursor:"pointer",background:strat?.id===s.id?"#E8F3ED":"transparent",fontWeight:strat?.id===s.id?600:400,color:strat?.id===s.id?"#166534":"#2C2C2C"}}>
                <div style={{width:16,height:16,borderRadius:"50%",border:"2px solid "+(strat?.id===s.id?"#166534":"#CCC"),background:strat?.id===s.id?"#166534":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  {strat?.id===s.id&&<div style={{width:6,height:6,background:"#fff",borderRadius:"50%"}}/>}
                </div>{s.id}. {s.name}
              </div>)}
            </div>
            {si&&<div style={{marginTop:10,background:"#E8F3ED",border:"1px solid #B8D9C5",borderRadius:12,padding:"10px 14px"}}>
              <div style={{fontWeight:700,color:"#166534",fontSize:14}}>{strat.name}</div>
              <div style={{fontSize:13,marginTop:4}}>{si.desc}</div>
              <div style={{fontSize:12,color:"#6B6B6B",fontWeight:600,marginTop:6}}>{si.grade}</div>
            </div>}
          </div>}/></>}

          {/* ===== STEP 3 ===== */}
          {step>=2&&<><Bub ch={<span>{strat.id}. {strat.name}</span>} u/>
          <Div l="Step 3 · Book"/>
          <Bub ch={<div>
            <b>These books work well for {strat.name}:</b>
            <div style={{marginTop:8}}>
              {books.map(b=><div key={b} onClick={()=>{sBook(b);sBCust(false);if(BOOK_KB[b]){sGenre(BOOK_KB[b].genre);sHasChar(BOOK_KB[b].hasChar);sHasIllus(BOOK_KB[b].hasIllus);sBookAbout(BOOK_KB[b].about);go(4)}else{go(3)}}} style={{padding:"8px 12px",borderRadius:10,fontSize:13,border:"1px solid "+(book===b&&!bCust?"#166534":"#E5E0DA"),background:book===b&&!bCust?"#E8F3ED":"#FAFAF8",cursor:"pointer",marginBottom:5}}>{b} {BOOK_KB[b]?<span style={{fontSize:9,fontWeight:700,color:"#22A652",background:"#D4F5DD",padding:"1px 6px",borderRadius:4,marginLeft:4}}>IN LIBRARY</span>:null}</div>)}
              <div onClick={()=>{sBook("");sBCust(true)}} style={{padding:"8px 12px",borderRadius:10,fontSize:13,border:"1px dashed "+(bCust?"#166534":"#CCC"),color:bCust?"#166534":"#6B6B6B",cursor:"pointer",background:bCust?"#E8F3ED":"transparent"}}>I'll use a different book</div>
            </div>
            {bCust&&<div style={{marginTop:8}}>
              <input type="text" value={book} onChange={e=>sBook(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&book.trim())go(3)}} placeholder="Type your book title..." style={{...S.fld,...(book?S.fldOk:{})}}/>
              {book.trim()&&<button onClick={()=>go(3)} style={S.btn}>Continue →</button>}
            </div>}
          </div>}/></>}

          {/* ===== STEP 3b: BOOK TYPE ===== */}
          {step>=3&&<><Bub ch={<span>{book}</span>} u/>
          <Div l="Step 3b · About Your Book"/>
          <Bub ch={<div>
            <div style={{fontSize:11.5,color:"#666",marginBottom:8}}>A few quick details help me tailor suggestions. All optional {"\u2014"} skip any you like.</div>

            <div style={{fontSize:12.5,fontWeight:600,marginBottom:5}}>What kind of book?</div>
            <div style={{display:"flex",gap:5,marginBottom:10}}>
              <div onClick={()=>sGenre("fiction")} style={{flex:1,textAlign:"center",padding:"7px 6px",borderRadius:10,fontSize:11.5,fontWeight:600,border:"2px solid "+(genre==="fiction"?"#166534":"#E5E0DA"),background:genre==="fiction"?"#E8F3ED":"#fff",cursor:"pointer"}}>Fiction</div>
              <div onClick={()=>sGenre("nonfiction")} style={{flex:1,textAlign:"center",padding:"7px 6px",borderRadius:10,fontSize:11.5,fontWeight:600,border:"2px solid "+(genre==="nonfiction"?"#166534":"#E5E0DA"),background:genre==="nonfiction"?"#E8F3ED":"#fff",cursor:"pointer"}}>Non-fiction</div>
              <div onClick={()=>sGenre("poetry")} style={{flex:1,textAlign:"center",padding:"7px 6px",borderRadius:10,fontSize:11.5,fontWeight:600,border:"2px solid "+(genre==="poetry"?"#166534":"#E5E0DA"),background:genre==="poetry"?"#E8F3ED":"#fff",cursor:"pointer"}}>Poetry/Other</div>
            </div>

            <div style={{fontSize:12.5,fontWeight:600,marginBottom:5}}>Main character?</div>
            <div style={{display:"flex",gap:5,marginBottom:10}}>
              <div onClick={()=>sHasChar("yes")} style={{flex:1,textAlign:"center",padding:"7px 6px",borderRadius:10,fontSize:11.5,fontWeight:600,border:"2px solid "+(hasChar==="yes"?"#166534":"#E5E0DA"),background:hasChar==="yes"?"#E8F3ED":"#fff",cursor:"pointer"}}>Yes</div>
              <div onClick={()=>sHasChar("no")} style={{flex:1,textAlign:"center",padding:"7px 6px",borderRadius:10,fontSize:11.5,fontWeight:600,border:"2px solid "+(hasChar==="no"?"#166534":"#E5E0DA"),background:hasChar==="no"?"#E8F3ED":"#fff",cursor:"pointer"}}>No</div>
            </div>

            <div style={{fontSize:12.5,fontWeight:600,marginBottom:5}}>Has illustrations?</div>
            <div style={{display:"flex",gap:5,marginBottom:10}}>
              <div onClick={()=>sHasIllus("yes")} style={{flex:1,textAlign:"center",padding:"7px 6px",borderRadius:10,fontSize:11.5,fontWeight:600,border:"2px solid "+(hasIllus==="yes"?"#166534":"#E5E0DA"),background:hasIllus==="yes"?"#E8F3ED":"#fff",cursor:"pointer"}}>Yes</div>
              <div onClick={()=>sHasIllus("no")} style={{flex:1,textAlign:"center",padding:"7px 6px",borderRadius:10,fontSize:11.5,fontWeight:600,border:"2px solid "+(hasIllus==="no"?"#166534":"#E5E0DA"),background:hasIllus==="no"?"#E8F3ED":"#fff",cursor:"pointer"}}>No</div>
            </div>

            <div style={{fontSize:12.5,fontWeight:600,marginBottom:5}}>In a sentence, what{"\u2019"}s this book about?</div>
            <textarea value={bookAbout} onChange={e=>sBookAbout(e.target.value)} rows={2} placeholder="e.g. A duckling gets rejected by other animals and discovers he's actually a swan" style={{width:"100%",padding:"8px 10px",borderRadius:10,border:"1.5px solid #E5E0DA",fontSize:12,lineHeight:1.4,background:"#FAFAF8",resize:"none",outline:"none"}}/>
            <div style={{fontSize:10.5,color:"#999",fontStyle:"italic",marginTop:3}}>Optional {"\u2014"} helps me give more specific suggestions.</div>

            <button onClick={()=>go(4)} style={{padding:"8px 18px",background:"#166534",color:"#fff",fontSize:12,borderRadius:10,fontWeight:600,border:"none",cursor:"pointer",marginTop:10,display:"block"}}>{"Continue \u2192"}</button>
          </div>}/></>}

          {/* ===== STEP 4: BEFORE READING ===== */}
          {step>=4&&<>
          {isKB&&<Bub ch={<div style={{background:"#EEFBF2",border:"1.5px solid #22A652",borderRadius:12,padding:"10px 14px"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#22A652",textTransform:"uppercase",letterSpacing:.8,marginBottom:3}}>{"\u2713"} {book} is in our library</div>
            <div style={{fontSize:12,color:"#555"}}>{kb.about}</div>
            <div style={{fontSize:11,color:"#888",marginTop:4}}>{"I\u2019ll give you tips specific to this book throughout."}</div>
          </div>}/>}
          <Div l="Step 4 · Before Reading"/>
          <Bub ch={<div>
            <b>How will you engage children before reading?</b>
            <div style={{fontSize:12.5,color:"#6B6B6B",margin:"4px 0 8px"}}>Pick up to 2 <span style={{display:"inline-block",fontSize:9,fontWeight:700,background:"#FFF3E6",color:"#E8913A",padding:"2px 6px",borderRadius:6,marginLeft:6,textTransform:"uppercase"}}>Max 2</span></div>
            {BEFORE_OPTS.map(o=><Chk key={o.label} l={o.label} on={bfC.includes(o.label)} off={bfC.length>=2&&!bfC.includes(o.label)} fn={()=>togBf(o.label)} badge={o.rec?"Always recommended":null}/>)}
            {bfC.length>0&&<button onClick={()=>go(5)} style={S.btn}>Continue →</button>}
          </div>}/></>}

          {/* STEP 4 FOLLOW-UPS — each gets strategy-linked suggestions */}
          {step>=5&&<><Bub ch={<span>{bfC.join(", ")}</span>} u/>

            {/* Introduce — just a simple instruction */}
            {bfC.includes("Introduce the book (title, author, illustrator)")&&<Bub ch={<div>
              <div style={{background:"#E8F3ED",border:"1px solid #B8D9C5",borderRadius:12,padding:"10px 14px",fontSize:13}}>
                <b style={{color:"#166534"}}>📖 Introduce the book:</b>
                <div style={{marginTop:4}}>Show the cover, read the title, author, and illustrator's name aloud.</div>
              </div>
            </div>}/>}

            {/* Connect follow-up */}
            {bfC.includes("Connect the story to children's experiences")&&<Bub ch={<div>
              <b>How will you connect to their experiences?</b>
              {isKB&&<div style={{fontSize:11,color:"#22A652",fontWeight:600,marginBottom:4}}>{"Tips for "+book+":"}</div>}
              <SuggPicker suggestions={isKB?kb.connectSuggs:connectSuggs} value={connectText} onChange={sConnectText}
                placeholder={isKB?"Pick one or write your own for "+book:"What question or prompt will you use to connect to their lives?"}
                label={isKB?null:"Tap one or write your own:"}/>
            </div>}/>}

            {/* Predictions follow-up */}
            {bfC.includes("Encourage predictions")&&<Bub ch={<div>
              <b>How will you encourage predictions?</b>
              {isKB&&<div style={{fontSize:11,color:"#22A652",fontWeight:600,marginBottom:4}}>{"For "+book+":"}</div>}
              <SuggPicker suggestions={isKB?kb.predictSuggs:predictSuggs} value={predictText} onChange={sPredictText}
                placeholder={isKB?"Pick one or write your own for "+book:"What will you ask students to predict?"}
                label={isKB?null:"Tap one or write your own:"}/>
            </div>}/>}

            {/* Vocab follow-up */}
            {bfC.includes("Explain new vocabulary")&&<Bub ch={<div>
              <b>What words will you introduce?</b>
              {isKB?<div>
                <div style={{fontSize:11,color:"#22A652",fontWeight:600,marginBottom:4}}>{"Suggested for "+book+":"}</div>
                {kb.vocab.map(function(v,i){
                  var parts=v.split("(");var word=parts[0].trim();var def=parts[1]?parts[1].replace(")",""):"";
                  return <div key={i} style={{display:"flex",alignItems:"baseline",gap:6,padding:"8px 12px",borderRadius:10,border:"1px solid #B8D9C5",background:"#EEFBF2",marginBottom:4,fontSize:13}}>
                    <span style={{fontWeight:700,color:"#166534",whiteSpace:"nowrap"}}>{word}</span><span>—</span><span>{def}</span>
                  </div>;
                })}
                <div style={{fontSize:11,color:"#888",fontStyle:"italic",marginTop:4}}>These are ready to use. You can also add your own.</div>
              </div>
              :<div>
                <div style={{fontSize:12,color:"#6B6B6B",marginBottom:6}}>Pick 2–3 words students need to understand the story.</div>
                <div style={{display:"flex",gap:6}}>
                  <input type="text" value={vW} onChange={e=>sVW(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")mkDefs()}} placeholder="e.g. ugly, duckling, swan" style={{...S.fld,flex:1}}/>
                  <button onClick={mkDefs} style={{...S.btn,marginTop:0}}>Go</button>
                </div>
                {showD&&vD.length>0&&<div style={{marginTop:10}}>
                  <div style={{fontSize:13,fontWeight:600,marginBottom:6}}>Here's how you could explain these:</div>
                  {vD.map((d,i)=><div key={i} style={{display:"flex",alignItems:"baseline",gap:6,padding:"8px 12px",borderRadius:10,border:"1px solid "+(d.edited?"#E8913A":"#E5E0DA"),background:d.edited?"#FFF3E6":"#FAFAF8",marginBottom:4,fontSize:13.5}}>
                    <span style={{fontWeight:700,color:"#166534",whiteSpace:"nowrap"}}>{d.word}</span><span>—</span>
                    <input type="text" value={d.meaning} onChange={e=>updDef(i,e.target.value)} style={{flex:1,background:"transparent",border:"none",fontSize:13,outline:"none"}}/>
                    {d.edited&&<span style={{fontSize:9,fontWeight:700,color:"#E8913A",textTransform:"uppercase"}}>edited</span>}
                  </div>)}
                  <div style={{fontSize:12,color:"#999",fontStyle:"italic",marginTop:4}}>Tap any definition to edit.</div>
                </div>}
              </div>}
            </div>}/>}

            {/* Cover follow-up */}
            {bfC.includes("Explore the cover and endpapers")&&<Bub ch={<div>
              <b>What will you ask about the cover?</b>
              {isKB?<div>
                <div style={{fontSize:11,color:"#22A652",fontWeight:600,marginBottom:4}}>{"For "+book+":"}</div>
                <div style={{padding:"8px 12px",borderRadius:10,fontSize:12.5,border:"2px solid #22A652",background:"#EEFBF2",marginBottom:6,cursor:"pointer"}} onClick={function(){sCQ(kb.coverQ)}}>
                  {kb.coverQ}
                </div>
                <div style={{fontSize:11,color:"#888",marginBottom:4}}>Tap to use, then edit if you like:</div>
              </div>
              :<div>
                <div style={S.alert}>{"\uD83D\uDC41\uFE0F"} Look at your cover first {"\u2014"} these are general suggestions. Pick or adapt what fits your cover.</div>
                <div style={{fontSize:12,color:"#6B6B6B",marginBottom:6}}>Tap a question to use it, then edit:</div>
                {COVER_QS_GENERAL.map(function(cq){return <QC key={cq} ty="General" co="#6B6B6B" tx={cq} sel={cQ===cq} fn={function(){sCQ(cq)}}/>})}
                {cQsS.map(function(cq){return <QC key={cq} ty={"Support "+strat.name} co="#166534" tx={cq} sel={cQ===cq} fn={function(){sCQ(cq)}}/>})}
                <div style={{fontSize:12,fontWeight:600,color:"#2563EB",marginTop:6,cursor:"pointer"}}>{"\uD83D\uDCD6"} See more questions {"\u2192"}</div>
                <div style={{fontSize:12,fontStyle:"italic",color:"#999",margin:"6px 0"}}>{"\u270D\uFE0F"} Make it your own {"\u2014"} use details from your book.</div>
              </div>}
              <textarea value={cQ} onChange={function(e){sCQ(e.target.value)}} rows={2} placeholder="Type or edit your question..." style={{...S.fld,...(cQ?S.fldOk:{})}}/>
            </div>}/>}

            <Bub ch={<div>
              <button onClick={()=>sShBA(!shBA)} style={S.detBtn}><span style={{fontSize:11,display:"inline-block",transition:"transform .2s",transform:shBA?"rotate(90deg)":"none"}}>▶</span> Before-reading activities you might try</button>
              {shBA&&<div style={{marginTop:6}}>{aS.map(a=><div key={a.name} style={{background:"#E8F3ED",border:"1px solid #B8D9C5",borderRadius:10,padding:"8px 12px",fontSize:13,marginBottom:4}}><b style={{color:"#166534"}}>{a.name}:</b> {a.desc}</div>)}</div>}
              <button onClick={()=>go(6)} style={{...S.btn,display:"block"}}>Continue to During Reading →</button>
            </div>}/>
          </>}

          {/* ===== STEP 5: DURING READING ===== */}
          {step>=6&&<><Bub ch={<span>Before Reading ready ✓</span>} u/>
          <Div l="Step 5 · During Reading"/>
          <Bub ch={<div style={{background:"#F5F0EB",border:"1px solid #E5E0DA",borderRadius:12,padding:"10px 14px",fontSize:13}}>
            <b>📚 Flip through your book and note:</b>
            <div style={{fontSize:12,color:"#6B6B6B",marginTop:4}}>• Difficult words &nbsp;• Dramatic pages &nbsp;• 1–2 pause moments</div>
            <div style={{fontSize:12,fontStyle:"italic",color:"#999",marginTop:4}}>Tip: Look for moments where {strat?.name} naturally comes up.</div>
          </div>}/>
          {/* CHANGE 2: "What will you do" not "what else" */}
          <Bub ch={<div>
            <b>What will you do during reading?</b>
            <div style={{fontSize:12,color:"#6B6B6B",margin:"4px 0 8px"}}>You'll plan your pause points next. Anything else on top of that? <span style={{display:"inline-block",fontSize:9,fontWeight:700,background:"#FFF3E6",color:"#E8913A",padding:"2px 6px",borderRadius:6,marginLeft:4,textTransform:"uppercase"}}>Optional</span></div>
            {DURING_OPTS.map(o=><Chk key={o} l={o} on={drC.includes(o)} off={drC.length>=2&&!drC.includes(o)} fn={()=>togDr(o)}/>)}
            <button onClick={()=>go(7)} style={S.btn}>Continue →</button>
          </div>}/></>}

          {/* During follow-ups + pauses always */}
          {step>=7&&<><Bub ch={<span>{drC.length?drC.join(", "):"No extras — just pauses"}</span>} u/>

            {hasVocabBefore&&hasWordsDuring&&<Bub ch={<div style={S.alert}>
              📝 You're introducing vocabulary before <i>and</i> during reading — that's fine, just be careful not to overdo it. Focus on different words for each phase.
            </div>}/>}

            {drC.includes("Explain important words or ideas")&&<Bub ch={<div>
              <b>Words to explain during reading?</b>
              <div style={{fontSize:12,color:"#6B6B6B",marginBottom:6}}>Already introduced words before? No need to repeat. These come up in the story.</div>
              <textarea value={drW} onChange={e=>sDrW(e.target.value)} rows={2} placeholder="e.g. rejected, reflection, graceful" style={{...S.fld,...(drW?S.fldOk:{})}}/>
            </div>}/>}

            {/* Pause points — always shown */}
            <Bub ch={<div>
              <b>Plan your pause points:</b>
              {isKB?<div>
                <div style={{fontSize:11,color:"#22A652",fontWeight:600,marginBottom:6}}>{"Suggested pauses for "+book+":"}</div>
                {kb.pauseSugg.map(function(ps,i){return <div key={i} style={{...S.pCard,...S.pCardOk,marginBottom:8}}>
                  <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.8,color:"#166534",marginBottom:4}}>{"Pause "+(i+1)}</div>
                  <div style={{fontSize:11,fontWeight:600,color:"#6B6B6B",marginBottom:2}}>Where:</div>
                  <div style={{fontSize:12,marginBottom:4}}>{ps.where}</div>
                  <div style={{fontSize:11,fontWeight:600,color:"#6B6B6B",marginBottom:2}}>What to do:</div>
                  <div style={{fontSize:12}}>{ps.what}</div>
                </div>})}
                <div style={{fontSize:11,color:"#888",fontStyle:"italic",marginTop:4}}>These are ready to use. Edit below if you want to change them.</div>
              </div>
              :<div>
                <div style={{fontSize:12,color:"#6B6B6B",marginBottom:6}}>Where will you stop? What will you do?</div>
                <div style={{fontSize:12,fontWeight:600,color:"#6B6B6B",marginBottom:4}}>At a pause you might:</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:10}}>
                  {PAUSE_ACTIONS.map(function(a){return <span key={a} style={{fontSize:11,background:"#F5F0EB",padding:"3px 8px",borderRadius:8,border:"1px solid #E5E0DA"}}>{a}</span>})}
                </div>
                <div style={{fontSize:12,fontWeight:600,color:"#166534",marginBottom:4}}>Questions that support {strat?.name}:</div>
                {pQs.map(function(pq){return <div key={pq} style={{fontSize:12,background:"#FAFAF8",border:"1px solid #E5E0DA",borderRadius:8,padding:"6px 10px",marginBottom:4}}>{"\u201C"+pq+"\u201D"}</div>})}
                <div style={{fontSize:12,fontWeight:600,color:"#2563EB",margin:"6px 0 10px",cursor:"pointer"}}>{"\uD83D\uDCD6"} See more questions {"\u2192"}</div>
              </div>}

              <div style={{...S.pCard,...(p1w?S.pCardOk:{})}}>
                <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.8,color:"#166534",marginBottom:6}}>Pause 1</div>
                <div style={{fontSize:11,fontWeight:600,color:"#6B6B6B",marginBottom:2}}>Where in the book?</div>
                <input type="text" value={p1w} onChange={function(e){sP1w(e.target.value)}} placeholder={isKB?kb.pauseSugg[0].where:"e.g. After something important happens"} style={{...S.fld,padding:"6px 10px",marginBottom:8,...(p1w?S.fldOk:{})}}/>
                <div style={{fontSize:11,fontWeight:600,color:"#6B6B6B",marginBottom:4}}>What will you do?</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:6}}>
                  {PAUSE_ACTIONS.map(function(a){return <span key={a} onClick={function(){sP1a(a)}} style={{...S.chip,...(p1a===a?S.chipOn:{})}}>{a}</span>})}
                </div>
                <input type="text" value={p1d} onChange={function(e){sP1d(e.target.value)}} placeholder={isKB?kb.pauseSugg[0].what:"e.g. Ask an inference question"} style={{...S.fld,padding:"6px 10px",...(p1d?S.fldOk:{})}}/>
              </div>

              <div style={{...S.pCard,...(p2w?S.pCardOk:{})}}>
                <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.8,color:"#166534",marginBottom:6}}>Pause 2</div>
                <div style={{fontSize:11,fontWeight:600,color:"#6B6B6B",marginBottom:2}}>Where in the book?</div>
                <input type="text" value={p2w} onChange={function(e){sP2w(e.target.value)}} placeholder={isKB&&kb.pauseSugg[1]?kb.pauseSugg[1].where:"e.g. At a surprising moment"} style={{...S.fld,padding:"6px 10px",marginBottom:8,...(p2w?S.fldOk:{})}}/>
                <div style={{fontSize:11,fontWeight:600,color:"#6B6B6B",marginBottom:4}}>What will you do?</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:6}}>
                  {PAUSE_ACTIONS.map(function(a){return <span key={a} onClick={function(){sP2a(a)}} style={{...S.chip,...(p2a===a?S.chipOn:{})}}>{a}</span>})}
                </div>
                <input type="text" value={p2d} onChange={function(e){sP2d(e.target.value)}} placeholder={isKB&&kb.pauseSugg[1]?kb.pauseSugg[1].what:"e.g. Ask why that happened"} style={{...S.fld,padding:"6px 10px",...(p2d?S.fldOk:{})}}/>
              </div>
              <div style={{fontSize:12,fontStyle:"italic",color:"#999",marginTop:4}}>{isKB?"Edit any of these to make them your own.":"\u270D\uFE0F Use the character\u2019s name and what\u2019s happening at that moment."}</div>
            </div>}/>

            <Bub ch={<div>
              <div style={{background:"#F5F0EB",borderRadius:10,padding:"8px 12px",fontSize:12,color:"#6B6B6B"}}><b>Keep in mind:</b> Short interactions · Give thinking time · All children see the book</div>
              <button onClick={()=>go(8)} style={{...S.btn,display:"block"}}>Continue to After Reading →</button>
            </div>}/>
          </>}

          {/* ===== STEP 6: AFTER READING ===== */}
          {step>=8&&<><Bub ch={<span>During Reading ready ✓</span>} u/>
          <Div l="Step 6 · After Reading"/>
          <Bub ch={<div>
            <b>Will you do a Turn & Talk?</b>
            <div style={{fontSize:13,color:"#6B6B6B",marginBottom:8}}>A quick Turn & Talk helps every student process the story.</div>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <button onClick={()=>{sTT(true);go(9)}} style={{flex:1,padding:10,borderRadius:12,border:"2px solid "+(doTT===true?"#166534":"#E5E0DA"),background:doTT===true?"#E8F3ED":"#FAFAF8",fontSize:15,fontWeight:600,cursor:"pointer",color:doTT===true?"#166534":"#2C2C2C"}}>Yes</button>
              <button onClick={()=>{sTT(false);go(9)}} style={{flex:1,padding:10,borderRadius:12,border:"2px solid "+(doTT===false?"#666":"#E5E0DA"),background:doTT===false?"#F0F0F0":"#FAFAF8",fontSize:15,fontWeight:600,cursor:"pointer",color:doTT===false?"#555":"#2C2C2C"}}>No</button>
            </div>
            <div style={S.rec}>⭐ Recommended — even 2 minutes of partner talk makes a difference.</div>
          </div>}/></>}

          {/* T&T question picker — tap to prefill, then edit */}
          {step>=9&&doTT&&<><Bub ch={<span>Yes — Turn & Talk</span>} u/>
          <Bub ch={<div>
            <b>Pick your Turn & Talk questions</b>
            {isKB?<div>
              <div style={{fontSize:11,color:"#22A652",fontWeight:600,margin:"4px 0 8px"}}>{"Questions for "+book+":"}</div>
              {kb.ttQs.map(function(tq,i){return <QC key={i} ty={tq.type} co={tq.co} tx={tq.q} sel={ttQs.includes(tq.q)} fn={function(){pickTTQ(tq.q)}}/>})}
              <div style={{marginTop:10}}>
                <button onClick={function(){setShowMatrix(!showMatrix)}} style={S.detBtn}>
                  <span style={{fontSize:11,display:"inline-block",transition:"transform .2s",transform:showMatrix?"rotate(90deg)":"none"}}>{"\u25B6"}</span>
                  {"More questions for "+book}
                </button>
                {showMatrix&&<div style={{marginTop:6}}>
                  {kb.ttExtras.map(function(tq,i){return <QC key={i} ty={tq.type} co={tq.co} tx={tq.q} sel={ttQs.includes(tq.q)} fn={function(){pickTTQ(tq.q)}}/>})}
                </div>}
              </div>
            </div>
            :<div>
              <div style={{fontSize:12,color:"#6B6B6B",margin:"4px 0 8px"}}>{"Here\u2019s one for each level, matched to "}<b>{strat?.name}</b>{". Tap to add, then edit:"}</div>
              <QC ty="Recall" co="#2563EB" tx={ttPicks.recall} sel={ttQs.includes(ttPicks.recall)} fn={function(){pickTTQ(ttPicks.recall)}}/>
              <QC ty="Connect" co="#166534" tx={ttPicks.connect} sel={ttQs.includes(ttPicks.connect)} fn={function(){pickTTQ(ttPicks.connect)}}/>
              <QC ty="Evaluate" co="#E8913A" tx={ttPicks.evaluate} sel={ttQs.includes(ttPicks.evaluate)} fn={function(){pickTTQ(ttPicks.evaluate)}}/>
              <div style={{marginTop:10}}>
                <button onClick={function(){setShowMatrix(!showMatrix)}} style={S.detBtn}>
                  <span style={{fontSize:11,display:"inline-block",transition:"transform .2s",transform:showMatrix?"rotate(90deg)":"none"}}>{"\u25B6"}</span>
                  Pick more from the full matrix
                </button>
                {showMatrix&&<div style={{marginTop:6}}>
                  {["recall","connect","evaluate"].map(function(cat){return <div key={cat}>
                    <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:.8,color:cat==="recall"?"#2563EB":cat==="connect"?"#166534":"#E8913A",margin:"8px 0 4px"}}>{cat}</div>
                    {(ttExtras[cat]||[]).map(function(tq){return <div key={tq} onClick={function(){pickTTQ(tq)}}
                      style={{...S.qC,...(ttQs.includes(tq)?S.qCSel:{}),fontSize:12}}>
                      {"\u201C"+tq+"\u201D"}
                    </div>})}
                  </div>})}
                </div>}
              </div>
            </div>}

            {/* Editable question slots */}
            <div style={{fontSize:12,fontWeight:600,color:"#6B6B6B",marginTop:12,marginBottom:4}}>Your questions — edit to personalize:</div>
            {ttQs.map(function(tq,i){return <div key={i} style={{display:"flex",gap:4,alignItems:"flex-start",marginBottom:6}}>
              <div style={{fontSize:11,fontWeight:700,color:"#166534",marginTop:8,flexShrink:0}}>{i+1}.</div>
              <textarea value={tq} onChange={function(e){updateTTQ(i,e.target.value)}} rows={2} placeholder="Type or tap a suggestion above..." style={{...S.fld,flex:1,...(tq?S.fldOk:{})}}/>
              {ttQs.length>1&&<button onClick={function(){removeTTQ(i)}} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:"#999",marginTop:6}}>{"\u2715"}</button>}
            </div>})}
            {ttQs.length<3&&<button onClick={addTTQ} style={{background:"none",border:"1px dashed #CCC",borderRadius:10,padding:"6px 12px",fontSize:12,color:"#6B6B6B",cursor:"pointer",width:"100%",marginTop:2}}>+ Add another question (up to 3)</button>}
            <div style={{fontSize:12,fontStyle:"italic",color:"#999",marginTop:6}}>{isKB?"Edit any of these to make them your own.":"\u270D\uFE0F Use the character\u2019s name and details from the story."}</div>
          </div>}/></>}
          {step>=9&&doTT===false&&<Bub ch={<span>No Turn & Talk</span>} u/>}

          {/* Activities */}
          {step>=9&&<><Bub ch={<div>
            <b>Want to add an activity?</b>
            <div style={{fontSize:12,color:"#6B6B6B",margin:"4px 0 4px"}}>{doTT?"Some teachers pair Turn & Talk with a hands-on activity.":"Pick an after-reading activity:"}</div>
            <div style={{fontSize:12.5,color:"#6B6B6B",marginBottom:8}}>Pick up to 2 <span style={{display:"inline-block",fontSize:9,fontWeight:700,background:"#E8F3ED",color:"#166534",padding:"2px 6px",borderRadius:6,marginLeft:4,textTransform:"uppercase"}}>1 recommended</span> <span style={{display:"inline-block",fontSize:9,fontWeight:700,background:"#FFF3E6",color:"#E8913A",padding:"2px 6px",borderRadius:6,marginLeft:4,textTransform:"uppercase"}}>Max 2</span></div>
            {AFTER_ACTS.map(o=>{
              const clean=afA.filter(x=>x!=="none");
              return <Chk key={o} l={o} on={afA.includes(o)} off={clean.length>=2&&!clean.includes(o)} fn={()=>togAf(o)}/>;
            })}
            {doTT&&<Chk l="No activity — just Turn & Talk" on={afA.includes("none")} fn={()=>sAfA(["none"])}/>}
            <button onClick={()=>sShAA(!shAA)} style={{...S.detBtn,marginTop:8}}><span style={{fontSize:11,display:"inline-block",transition:"transform .2s",transform:shAA?"rotate(90deg)":"none"}}>▶</span> Activities that support {strat?.name}</button>
            {shAA&&<div style={{marginTop:4}}>{aS.map(a=><div key={a.name} style={{background:"#E8F3ED",border:"1px solid #B8D9C5",borderRadius:10,padding:"8px 12px",fontSize:12,marginBottom:4}}><b style={{color:"#166534"}}>{a.name}:</b> {a.desc}</div>)}</div>}
          </div>}/>

          {/* Editable activity details — KB-specific per activity type, or generic */}
          {afA.filter(a=>a!=="none").map(function(act){
            var kbOpts = isKB && kb.actByType && kb.actByType[act] ? kb.actByType[act] : null;
            var genOpts = ACT_PREFILLS[act] || [];
            var opts = kbOpts || genOpts;
            return <Bub key={act} ch={<div>
              <b style={{fontSize:13}}>{act}</b>
              {isKB&&kbOpts&&<div style={{fontSize:11,color:"#22A652",fontWeight:600,marginTop:4}}>{"For "+book+":"}</div>}
              <div style={{fontSize:12,color:"#6B6B6B",marginTop:isKB&&kbOpts?2:4,marginBottom:6}}>Tap a suggestion to start, then edit:</div>
              <div style={{marginBottom:6}}>
                {opts.map(function(s,i){return <span key={i} onClick={function(){setAfNote(act,s)}}
                  style={{...S.suggBubble,...(afNotes[act]===s?S.suggBubbleSel:{})}}>{s}</span>})}
              </div>
              <div style={{fontSize:12,fontStyle:"italic",color:"#999",marginBottom:4}}>{isKB?"Edit to make it your own.":"\u270D\uFE0F Tap one or write your own \u2014 make it specific to your book."}</div>
              <textarea value={afNotes[act]||""} onChange={function(e){setAfNote(act,e.target.value)}} rows={2}
                placeholder={isKB?"Edit the suggestion or write your own":"What specifically will students do?"}
                style={{...S.fld,...(afNotes[act]?S.fldOk:{})}}/>
            </div>}/>;
          })}

          {(afA.length>0||getAllTTQs().length>0)&&<Bub ch={<button onClick={()=>go(10)} style={S.btn}>Review my plan →</button>}/>}
          </>}

          {/* ===== STEP 7: REVIEW — CHANGE 5: capture everything ===== */}
          {step>=10&&<><Bub ch={<span>After Reading ready ✓</span>} u/>
          <Div l="Step 7 · Review & Save"/>
          <Bub ch={<div>
            <b>Here's your plan:</b>
            <div style={S.sum}>
              <div style={{fontSize:12,color:"#6B6B6B",marginBottom:8}}>Grade {grade} · {stu} students · {book}<br/>Objective: {strat?.id}. {strat?.name}{genre&&<span> · {genre}{hasChar==="yes"?" · has main character":""}{hasIllus==="yes"?" · illustrated":""}</span>}</div>
              {bookAbout&&<div style={{fontSize:11.5,color:"#888",fontStyle:"italic",marginBottom:8}}>{bookAbout}</div>}

              <div><div style={S.sumLbl}>Before Reading</div>
                <div style={{fontSize:12.5}}>{bfC.join(", ")}</div>
                {bfC.includes("Introduce the book (title, author, illustrator)")&&<div style={{fontSize:12.5,marginTop:2}}><b>Intro:</b> Show the cover, read the title, author, and illustrator's name aloud.</div>}
                {connectText&&<div style={{fontSize:12.5,marginTop:2}}><b>Connect:</b> {connectText}</div>}
                {predictText&&<div style={{fontSize:12.5,marginTop:2}}><b>Predictions:</b> {predictText}</div>}
                {vD.length>0&&<div style={{fontSize:12.5,marginTop:2}}><b>Vocab:</b> {vD.map(d=>d.word+" ("+d.meaning+")").join(", ")}</div>}
                {cQ&&<div style={{fontSize:12.5,marginTop:2}}><b>Cover Q:</b> "{cQ}"</div>}
              </div>

              <div style={S.sumSec}><div style={S.sumLbl}>During Reading</div>
                {drC.length>0&&<div style={{fontSize:12.5}}>{drC.join(", ")}</div>}
                {drW&&<div style={{fontSize:12.5,marginTop:2}}><b>Words:</b> {drW}</div>}
                {p1w&&<div style={{fontSize:12.5,marginTop:2}}><b>Pause 1:</b> {p1w} → {p1a}{p1d?", "+p1d:""}</div>}
                {p2w&&<div style={{fontSize:12.5,marginTop:2}}><b>Pause 2:</b> {p2w} → {p2a}{p2d?", "+p2d:""}</div>}
                {!p1w&&!p2w&&!drC.length&&!drW&&<div style={{fontSize:12.5,color:"#999"}}>(No details entered)</div>}
              </div>

              <div style={S.sumSec}><div style={S.sumLbl}>After Reading</div>
                {doTT&&getAllTTQs().length>0&&<div style={{fontSize:12.5}}>
                  <b>Turn & Talk:</b>
                  {getAllTTQs().map((x,i)=><div key={i} style={{marginLeft:8}}>• "{x.q}"</div>)}
                </div>}
                {doTT&&getAllTTQs().length===0&&<div style={{fontSize:12.5}}>Turn & Talk (no questions selected)</div>}
                {doTT===false&&<div style={{fontSize:12.5}}>No Turn & Talk</div>}
                {afA.filter(a=>a!=="none").map(act=>(
                  <div key={act} style={{fontSize:12.5,marginTop:2}}><b>{act}:</b> {afNotes[act]||"(no details)"}</div>
                ))}
                {getAllTTQs().length>0&&<div style={{fontSize:12.5,marginTop:4}}><b>R/C/E:</b> {autoRCE().join(", ")}</div>}
              </div>
            </div>
            {mode==="build"&&!saved?<button onClick={()=>sSaved(true)} style={{marginTop:12,width:"100%",padding:14,background:"#166534",color:"#fff",border:"none",borderRadius:14,fontSize:16,fontWeight:700,cursor:"pointer"}}>Save lesson plan</button>
            :mode==="build"&&saved?<div style={{textAlign:"center",marginTop:12}}>
              <div style={{fontSize:24,marginBottom:4}}>{"\uD83C\uDF1F"}</div>
              <div style={{fontWeight:700,color:"#166534"}}>Saved! Good luck with your lesson.</div>
              <div style={{fontSize:12,color:"#6B6B6B",marginTop:4}}>Want to build another plan?</div>
            </div>
            :<div style={{textAlign:"center",marginTop:12}}>
              <div style={{fontSize:24,marginBottom:4}}>{"\uD83C\uDF1F"}</div>
              <div style={{fontWeight:700,color:"#166534"}}>{"You\u2019re all set! Good luck with your lesson."}</div>
              <div style={{fontSize:12,color:"#6B6B6B",marginTop:4}}>Use this as a reference while you plan. Come back any time.</div>
            </div>}
          </div>}/></>}

          <div ref={er}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
